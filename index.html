<!--
Create a Task Manager Dashboard using HTML, CSS, and JavaScript.

Features:
- Add, delete, edit, and view tasks
- Mark tasks as completed
- Set priority levels and due dates
- Highlight overdue tasks
- Display task statistics (total, completed, pending)
- Show progress bar for completion tracking
- Implement search functionality
- Store data using localStorage

Copilot was used to generate the base code.
Further improvements were made to enhance UI/UX and add advanced features.
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Manager Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <p id="quote"></p>

    <h2>Task Manager Dashboard</h2>

    <!-- Search -->
    <input id="search" placeholder="Search tasks..." onkeyup="searchTask()">

    <!-- Input -->
    <input id="taskInput" placeholder="Enter task">
    <input type="date" id="dueDate">

    <select id="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <button onclick="addTask()">Add Task</button>

    <!-- Stats -->
    <p id="stats"></p>

    <!-- Progress -->
    <div class="progress-box">
        <div id="progressBar"></div>
    </div>
    <p id="progressText"></p>

    <h3>Pending Tasks</h3>
    <div id="pending"></div>

    <h3>Completed Tasks</h3>
    <div id="completed"></div>

</div>

<script src="script.js"></script>
</body>
</html>
